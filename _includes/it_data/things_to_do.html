<!-- Things To Do Section --> 
<section id="things_to_do">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Cosa fare a Burgos</h2>
                <h3 class="section-subheading text-muted">Burgos e i suoi dintorni offrono numerose attività e luoghi di interesse. Qui vi lasciamo alcuni suggerimenti per sfruttare al meglio il vostro soggiorno.</h3>
            </div>
        </div>
        <div class="row">
        {% for post in site.data.it.thingstodo %}
            <div class="col-md-4 col-sm-6 portfolio-item">
                <a href="#portfolioModal{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
                    <div class="portfolio-hover">
                        <div class="portfolio-hover-content">
                            <i class="fa fa-plus fa-3x"></i>
                        </div>
                    </div>
                    <img src="{{ site.baseurl }}/img/portfolio/{{ post.thumbnail }}" class="img-responsive img-centered" alt="">
                </a>
                <div class="portfolio-caption">
                    <h4>{{ post.title }}</h4>
                    <p class="text-muted">{{ post.subtitle }}</p>
                </div>
            </div>
        {% endfor %}
        </div>
    </div>
</section>
